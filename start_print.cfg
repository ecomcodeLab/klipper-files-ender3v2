[gcode_macro START_PRINT]
description: Optimiertes Start-Makro mit KAMP und parallelem Heizen

gcode:
    # ============================================================
    # PARAMETER LADEN UND VALIDIEREN
    # ============================================================
    {% set BED_TEMP      = params.BED|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(200)|float %}

    {% if params.BED is not defined %}
        {action_respond_info("⚠️ BED-Parameter fehlt! Verwende Default: 60°C")}
    {% endif %}

    {% if params.EXTRUDER is not defined %}
        {action_respond_info("⚠️ EXTRUDER-Parameter fehlt! Verwende Default: 200°C")}
    {% endif %}

    # ============================================================
    # GRUNDEINSTELLUNGEN
    # ============================================================
    M117 Initialisierung...
    G90                                 ; Absolute Positionierung
    M83                                 ; Relativer Extruder-Modus
    M106 S0                             ; Lüfter aus

    # ============================================================
    # BETT UND DÜSE GLEICHZEITIG AUFHEIZEN
    # ============================================================
    M140 S{BED_TEMP}                    ; Bett-Temperatur setzen (nicht blockierend)
    M104 S{EXTRUDER_TEMP}               ; Düse-Temperatur setzen (nicht blockierend)
    
    M117 Heize Bett und Düse...
    M190 S{BED_TEMP}                    ; Auf Bett warten (blockierend)
    M109 S{EXTRUDER_TEMP}               ; Auf Düse warten (blockierend)

    # ============================================================
    # HOMING BEI BETRIEBSTEMPERATUR
    # ============================================================
    M117 Homing...
    G28                                 ; Alle Achsen homen

    # ============================================================
    # SMART PARK - NÄHE ZUM DRUCK
    # ============================================================
    {% if printer['gcode_macro SMART_PARK'] is defined %}
        SMART_PARK
    {% else %}
        G1 X5 Y5 Z30 F6000              ; Fallback-Position
    {% endif %}

    # ============================================================
    # BED MESH CALIBRATION (KAMP)
    # ============================================================
    M117 Bed Mesh Calibration...
    BED_MESH_CLEAR                      ; Altes Mesh löschen
    BED_MESH_CALIBRATE                  ; Adaptives Mesh mit KAMP

    # ============================================================
    # PURGE-LINIE (KAMP oder Fallback)
    # ============================================================

    {% if printer['gcode_macro LINE_PURGE'] is defined %}
        LINE_PURGE
    {% else %}
        # Fallback: Klassische Purge-Linie - linker Rand
        G90
        G92 E0
        G1 Z10.0 F3000
        G1 X15 Y5
        G1 E10.0 F1800
        G1 Z0.28 F5000.0
        G1 X15 Y230 E30 F1500.0
        G92 E0
        G1 Z10 F3000
    {% endif %}
    # ============================================================
    # FINALE VORBEREITUNG
    # ============================================================
    G1 Z2.0 F3000                       ; Düse 2mm anheben
    G92 E0                              ; Extruder auf Null setzen
    M117 Druck startet...

    # ============================================================
    # DRUCK LÄUFT
    # ============================================================