[gcode_macro END_PRINT]
gcode:
    # ==========================================
    # Bewegungen abschließen und Filament zurückziehen
    # ==========================================
    M400                           ; Warte bis alle Bewegungen abgeschlossen sind
    G92 E0                         ; Extruder Position auf 0 setzen
    G91                            ; Relative Positionierung
    G1 E-5 F2400                   ; Filament 5mm zurückziehen (verhindert Oozing)
    G90                            ; Absolute Positionierung
    
    # ==========================================
    # Druckkopf sicher nach oben bewegen
    # ==========================================
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set cur_z = printer.toolhead.position.z|float %}
    {% set park_z = [cur_z + 30, max_z - 5]|min %}
    
    G1 Z{park_z} F3000             ; Z-Achse sicher nach oben (30mm oder max-5mm)
    
    # ==========================================
    # Druckkopf in intelligente Parkposition fahren
    # ==========================================
    {% set max_y = printer.toolhead.axis_maximum.y|float %}
    G1 X5 F6000                    ; X-Achse in Parkposition (links)
    G1 Y{max_y - 10} F6000         ; Y-Achse nach hinten (dynamisch basierend auf Drucker)
    
    # ==========================================
    # Lüfter und Mesh ausschalten
    # ==========================================
    M107                           ; Lüfter ausschalten
    BED_MESH_CLEAR                 ; Bed Mesh Daten löschen
    
    # ==========================================
    # Heizungen auf 0 Grad ausschalten
    # ==========================================
    M104 S0                        ; Hotend ausschalten (0°C)
    M140 S0                        ; Heizbett ausschalten (0°C)
    
    # ==========================================
    # Abkühlung + Motoren deaktivieren
    # ==========================================
    G4 P10000                      ; 10 Sekunden warten (Hotend & Bett kühlen sicher ab)
    M84                            ; Alle Motoren deaktivieren
    
    # ==========================================
    # Status-Nachricht
    # ==========================================
    M117 Fertig!                   ; Nachricht auf Display anzeigen